<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bubble Pop Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell">
      <div class="top-bar">
        <h1>Bubble Pop</h1>
        <div class="score-card">Score: <span id="score">0</span></div>
      </div>

      <div id="gameArea" class="game-area" aria-label="Bubble popping game"></div>
      <p class="hint">Pop bubbles before they drift off-screen. Small bubbles are worth 3, medium are worth 2, and big bubbles are worth 1.</p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
